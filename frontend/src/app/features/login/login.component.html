<div class="login-wrapper">
  <div class="card login-card p-4 shadow-lg">
    <div class="text-center mb-4">
      <i class="bi bi-layers-fill text-primary-tg" style="font-size:2.5rem"></i>
      <h4 class="fw-bold mt-2 text-primary-tg">Tecnoglass</h4>
      <p class="text-muted small">Sistema de Trazabilidad de Producción</p>
    </div>

    @if (error()) {
      <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" formControlName="username" placeholder="usuario" autocomplete="username">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" formControlName="password" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn w-100 bg-primary-tg fw-semibold" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2"></span> Ingresando...
        } @else {
          <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión
        }
      </button>
    </form>
  </div>
</div>
